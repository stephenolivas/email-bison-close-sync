name: EmailBison → Close CRM Sync

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    name: Sync EmailBison replies to Close
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push the state file back cleanly
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          EMAILBISON_API_KEY: ${{ secrets.EMAILBISON_API_KEY }}
          EMAILBISON_BASE_URL: ${{ secrets.EMAILBISON_BASE_URL }}
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python sync.py

      - name: Commit updated state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Only commit if state.json actually changed
          git diff --staged --quiet || git commit -m "chore: update EmailBison sync state [skip ci]"
          git push
